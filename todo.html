<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>To-Do List</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}
:root{
  --surface-0:#f5f4f0;--surface-1:#eeecea;--surface-2:#ffffff;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;
  --border:#d3d1c7;--border-strong:#b4b2a9;
  --bg-accent:#e6f1fb;--text-accent:#185fa5;--border-accent:#85b7eb;
  --fill-success:#1d9e75;--text-success:#0f6e56;
  --text-danger:#a32d2d;--radius:8px
}
@media(prefers-color-scheme:dark){
  :root{
    --surface-0:#1a1a18;--surface-1:#2c2c2a;--surface-2:#3a3a38;
    --text-primary:#f1efe8;--text-secondary:#b4b2a9;--text-muted:#888780;
    --border:#444441;--border-strong:#5f5e5a;
    --bg-accent:#0c447c;--text-accent:#85b7eb;--border-accent:#185fa5;
    --fill-success:#085041;--text-success:#5dcaa5;
    --text-danger:#f09595;
  }
}
body{background:var(--surface-0);color:var(--text-primary);min-height:100vh;padding-bottom:80px}
.app{max-width:480px;margin:0 auto;padding:1rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.header h1{font-size:20px;font-weight:600;color:var(--text-primary)}
.add-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;display:none}
.form-card.open{display:block}
.form-card input[type=text]{width:100%;height:42px;padding:0 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:15px;margin-bottom:8px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-row input[type=date],.form-row select{height:40px;padding:0 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:13px;flex:1;min-width:0}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.btn-cancel{height:36px;padding:0 16px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:14px;cursor:pointer}
.btn-save{height:36px;padding:0 16px;border-radius:var(--radius);border:1px solid var(--border-accent);background:var(--bg-accent);color:var(--text-accent);font-size:14px;cursor:pointer;font-weight:600}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.chip{height:30px;padding:0 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-secondary);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{border-color:var(--border-accent);background:var(--bg-accent);color:var(--text-accent);font-weight:600}
.section-label{font-size:11px;color:var(--text-muted);font-weight:600;padding:0 2px;margin-bottom:6px;margin-top:1.25rem;letter-spacing:0.06em;text-transform:uppercase}
.todo-item{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:0.85rem 1rem;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.todo-item.done{opacity:0.5}
.check-btn{width:24px;height:24px;min-width:24px;border-radius:50%;border:2px solid var(--border-strong);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
.check-btn.checked{background:var(--fill-success);border-color:var(--fill-success)}
.check-btn i{font-size:14px;color:white;display:none}
.check-btn.checked i{display:block}
.todo-body{flex:1;min-width:0}
.todo-title{font-size:15px;color:var(--text-primary);line-height:1.4;word-break:break-all}
.todo-item.done .todo-title{text-decoration:line-through;color:var(--text-muted)}
.todo-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:600}
.p-high{background:#fcebeb;color:#a32d2d}
.p-mid{background:#faeeda;color:#854f0b}
.p-low{background:#eaf3de;color:#3b6d11}
.cat-badge{background:var(--surface-1);color:var(--text-secondary);border:1px solid var(--border)}
.date-meta{font-size:11px;color:var(--text-muted)}
.done-date{font-size:11px;color:var(--text-success)}
.del-btn{width:32px;height:32px;border-radius:var(--radius);border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.empty{text-align:center;color:var(--text-muted);font-size:14px;padding:3rem 0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>To-Do List</h1>
    <button class="add-btn" onclick="toggleForm()" aria-label="태스크 추가"><i class="ti ti-plus"></i></button>
  </div>

  <div class="form-card" id="formCard">
    <div style="position:relative">
      <input type="text" id="titleInput" placeholder="할 일 입력" autocomplete="off" oninput="showSuggestions()" onkeydown="handleKey(event)">
      <input type="text" id="memoInput" placeholder="메모 (선택)" style="width:100%;height:36px;padding:0 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:13px;margin-top:6px">
      <div id="suggBox" style="display:none;position:absolute;top:44px;left:0;right:0;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);z-index:10;overflow:hidden"></div>
    </div>
    <div class="form-row">
      <input type="date" id="dateInput">
      <select id="prioInput">
        <option value="high">🔴 높음</option>
        <option value="mid" selected>🟡 중간</option>
        <option value="low">🟢 낮음</option>
      </select>
    </div>
    <div class="form-row">
      <select id="repeatInput" style="flex:0 0 auto;width:110px">
        <option value="none">🔁 없음</option>
        <option value="weekly">매주 반복</option>
        <option value="monthly">매월 반복</option>
      </select>
      <select id="catInput" style="flex:1">
        <option value="">분류없음</option>
        <option value="집">🏠 집</option>
        <option value="AI">🤖 AI</option>
        <option value="재테크">💰 재테크</option>
        <option value="차량">🚗 차량</option>
        <option value="소비">🛒 소비</option>
        <option value="본가&외가댁">🏡 본가&외가댁</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="toggleForm()">취소</button>
      <button class="btn-save" onclick="addTodo()">추가</button>
    </div>
  </div>


  <div style="display:flex;gap:8px;margin-bottom:1rem;justify-content:flex-end">
    <button onclick="exportData()" style="height:30px;padding:0 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-secondary);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px"><i class="ti ti-download" style="font-size:14px"></i> 백업</button>
    <label style="height:30px;padding:0 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-secondary);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px"><i class="ti ti-upload" style="font-size:14px"></i> 복원<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
  </div>
  <div class="filter-row">
    <button class="chip active" onclick="setFilter('all',this)">전체</button>
    <button class="chip" onclick="setFilter('todo',this)">미완료</button>
    <button class="chip" onclick="setFilter('done',this)">완료</button>
    <button class="chip" onclick="setFilter('high',this)">🔴 높음</button>
    <button class="chip" onclick="setFilter('mid',this)">🟡 중간</button>
    <button class="chip" onclick="setFilter('low',this)">🟢 낮음</button>
  </div>
  <div class="filter-row" style="margin-top:-4px">
    <button class="chip active" id="sort_prio_desc" onclick="setSort('prio_desc',this)">🔴높은순</button>
    <button class="chip" id="sort_prio_asc" onclick="setSort('prio_asc',this)">🟢낮은순</button>
    <button class="chip" id="sort_date_asc" onclick="setSort('date_asc',this)">📅빠른순</button>
    <button class="chip" id="sort_date_desc" onclick="setSort('date_desc',this)">📅늦은순</button>
  </div>

  <div id="listContainer"></div>
</div>

<script>
const STORE='todos_v1';
let todos=[];
let filter='all';
let sort='prio_desc';

function load(){try{todos=JSON.parse(localStorage.getItem(STORE)||'[]');}catch(e){todos=[];}}
function save(){localStorage.setItem(STORE,JSON.stringify(todos));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function toggleForm(){
  const c=document.getElementById('formCard');
  c.classList.toggle('open');
  if(c.classList.contains('open'))document.getElementById('titleInput').focus();
}

function addTodo(){
  const t=document.getElementById('titleInput').value.trim();
  if(!t)return;
  todos.unshift({id:uid(),title:t,date:document.getElementById('dateInput').value,prio:document.getElementById('prioInput').value,cat:document.getElementById('catInput').value,repeat:document.getElementById('repeatInput').value,memo:document.getElementById('memoInput').value.trim(),done:false,doneAt:null,createdAt:new Date().toISOString()});
  addHistory(t);
  save();
  document.getElementById('titleInput').value='';
  document.getElementById('memoInput').value='';
  document.getElementById('formCard').classList.remove('open');
  render();
}

function toggle(id){
  const t=todos.find(x=>x.id===id);
  if(!t)return;
  t.done=!t.done;
  t.doneAt=t.done?new Date().toISOString():null;
  if(t.done && t.repeat && t.repeat!=='none' && t.date){
    const next=new Date(t.date+'T00:00:00');
    if(t.repeat==='weekly') next.setDate(next.getDate()+7);
    else if(t.repeat==='monthly') next.setMonth(next.getMonth()+1);
    const nextStr=next.toISOString().slice(0,10);
    todos.unshift({id:uid(),title:t.title,date:nextStr,prio:t.prio,cat:t.cat,repeat:t.repeat,memo:t.memo||'',done:false,doneAt:null,createdAt:new Date().toISOString()});
  }
  save();render();
}

function del(id){
  if(!confirm('삭제할까요?'))return;
  todos=todos.filter(x=>x.id!==id);
  save();render();
}


function setSort(s, el){
  sort=s;
  document.querySelectorAll('#sort_prio_desc,#sort_prio_asc,#sort_date_asc,#sort_date_desc').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function fmtDate(iso){if(!iso)return '';const d=new Date(iso+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtDoneDate(iso){if(!iso)return '';const d=new Date(iso);return `완료 ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

const PRIO_LABEL={high:'높음',mid:'중간',low:'낮음'};
const PRIO_CLASS={high:'p-high',mid:'p-mid',low:'p-low'};

function getSorted(list){
  const prioOrder={high:0,mid:1,low:2};
  return [...list].sort((a,b)=>{
    // 완료는 항상 맨 아래
    if(a.done!==b.done)return a.done?1:-1;

    if(sort==='prio_desc'||sort==='prio_asc'){
      const dir=sort==='prio_desc'?1:-1;
      if(prioOrder[a.prio]!==prioOrder[b.prio])return (prioOrder[a.prio]-prioOrder[b.prio])*dir;
      // 같은 우선순위면 마감 빠른순
      if(a.date&&b.date)return a.date.localeCompare(b.date);
      if(a.date)return -1;
      if(b.date)return 1;
      return 0;
    }
    if(sort==='date_asc'||sort==='date_desc'){
      const dir=sort==='date_asc'?1:-1;
      if(a.date&&b.date)return a.date.localeCompare(b.date)*dir;
      if(a.date)return sort==='date_asc'?-1:1;
      if(b.date)return sort==='date_asc'?1:-1;
      // 날짜 없으면 우선순위순
      if(prioOrder[a.prio]!==prioOrder[b.prio])return prioOrder[a.prio]-prioOrder[b.prio];
      return 0;
    }
    return 0;
  });
}

function render(){
  let list=todos.filter(x=>!x.hidden);
  if(filter==='todo')list=list.filter(x=>!x.done);
  else if(filter==='done')list=list.filter(x=>x.done);
  else if(filter==='high')list=list.filter(x=>x.prio==='high');
  else if(filter==='mid')list=list.filter(x=>x.prio==='mid');
  else if(filter==='low')list=list.filter(x=>x.prio==='low');

  const sorted=getSorted(list);
  const container=document.getElementById('listContainer');

  if(!sorted.length){container.innerHTML='<div class="empty">태스크가 없어요</div>';return;}

  const todayStr=new Date().toISOString().slice(0,10);
  let html='';
  let lastGroup=null;

  sorted.forEach(t=>{
    let group;
    if(t.done)group='완료';
    else if(!t.date)group='날짜 없음';
    else if(t.date<todayStr)group='기한 지남';
    else if(t.date===todayStr)group='오늘';
    else group='예정';

    if(group!==lastGroup){html+=`<div class="section-label">${group}</div>`;lastGroup=group;}

    html+=`<div class="todo-item${t.done?' done':''}" onclick="toggleMemo('${t.id}')" style="cursor:pointer">
      <button class="check-btn${t.done?' checked':''}" onclick="toggle('${t.id}')" aria-label="완료 토글"><i class="ti ti-check"></i></button>
      <div class="todo-body">
        <div class="todo-title">${esc(t.title)}</div>
        <div class="todo-meta">
          <span class="badge ${PRIO_CLASS[t.prio]}">${PRIO_LABEL[t.prio]}</span>
          ${t.cat?`<span class="badge cat-badge">${esc(t.cat)}</span>`:''}
          ${t.date?`<span class="date-meta"><i class="ti ti-calendar" style="font-size:11px;vertical-align:-1px"></i> ${fmtDate(t.date)}</span>`:''}
          ${t.repeat&&t.repeat!=='none'?`<span class="badge" style="background:var(--surface-1);color:var(--text-accent);border:1px solid var(--border-accent)">${t.repeat==='weekly'?'매주':'매월'}</span>`:''}
          ${t.doneAt?`<span class="done-date">${fmtDoneDate(t.doneAt)}</span>`:''}
        </div>
        ${t.memo?`<div id="memo_${t.id}" style="display:none;margin-top:6px;font-size:13px;color:var(--text-secondary);border-top:1px solid var(--border);padding-top:6px">${esc(t.memo)}</div>`:''}
        <div style='display:none'>
        </div>
      </div>
      <button class="del-btn" onclick="del('${t.id}')" aria-label="삭제"><i class="ti ti-trash"></i></button>
    </div>`;
  });

  container.innerHTML=html;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}


function toggleMemo(id){
  const el=document.getElementById('memo_'+id);
  if(!el)return;
  el.style.display=el.style.display==='none'?'block':'none';
}

function exportData(){
  const data=JSON.stringify(todos,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`todo_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)){alert('올바른 백업 파일이 아니에요');return;}
      if(!confirm(`${data.length}개 태스크를 불러올게요. 현재 데이터는 덮어써져요. 계속할까요?`))return;
      todos=data;
      save();render();
      alert('복원 완료!');
    }catch(err){alert('파일을 읽을 수 없어요');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function autoUpdateOverdue(){
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  let changed=false;
  todos.forEach(t=>{
    if(!t.done && t.date && t.date < todayStr){
      t.date=todayStr;
      changed=true;
    }
  });
  // 완료 후 1일 지난 항목 숨김 처리
  todos.forEach(t=>{
    if(t.done && t.doneAt){
      const doneDate=new Date(t.doneAt);
      const diff=(now-doneDate)/(1000*60*60*24);
      if(diff>=1) t.hidden=true;
    }
  });
  if(changed){save();}
}

const HISTORY_KEY='todo_history';
function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return[];}}
function addHistory(title){
  let h=getHistory().filter(x=>x!==title);
  h.unshift(title);
  h=h.slice(0,3);
  localStorage.setItem(HISTORY_KEY,JSON.stringify(h));
}

function showSuggestions(){
  const val=document.getElementById('titleInput').value.trim();
  const box=document.getElementById('suggBox');
  const h=getHistory().filter(x=>x.includes(val));
  if(!h.length||!val){box.style.display='none';return;}
  box.innerHTML=h.map((x,i)=>`<div onclick="selectSugg('${x.replace(/'/g,"&#39;")}')" style="padding:10px 12px;font-size:14px;color:var(--text-primary);border-bottom:1px solid var(--border);cursor:pointer" onmousedown="event.preventDefault()">${esc(x)}</div>`).join('');
  box.style.display='block';
}

function selectSugg(val){
  document.getElementById('titleInput').value=val;
  document.getElementById('suggBox').style.display='none';
}

function handleKey(e){
  if(e.key==='Enter'){addTodo();}
  if(e.key==='Escape'){document.getElementById('suggBox').style.display='none';}
}

document.addEventListener('click',function(e){
  if(!e.target.closest('#suggBox')&&e.target.id!=='titleInput'){
    document.getElementById('suggBox').style.display='none';
  }
});

load();autoUpdateOverdue();render();


</script>
</body>
</html>
